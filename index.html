<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RetroPod</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#111;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  font-family:'Noto Sans KR',sans-serif;
}

/* ── iPod 컨테이너 (SVG + LCD 오버레이 기준점) ── */
#ipod-container{
  position:relative;
  display:inline-block;
  line-height:0;
}
#ipod-svg{
  width:min(290px,90vw,55vh);
  height:auto;
  display:block;
  overflow:visible;
}
/* LCD 오버레이: foreignObject 대체, % 좌표로 정밀 배치 */
.lcd-overlay{
  position:absolute;
  /* viewBox "185 5 288 482" 기준 foreignObject 좌표 → % 변환 */
  top:4.917%;      /* (28.7  - 5)   / 482 * 100 */
  left:7.875%;     /* (207.68- 185) / 288 * 100 */
  width:84.181%;   /* 242.44 / 288  * 100 */
  height:38.247%;  /* 184.35 / 482  * 100 */
  pointer-events:none;  /* SVG 휠/버튼 클릭 통과 */
  overflow:hidden;
  border-radius:6px;
}

/* ── LCD (foreignObject) 내부 스타일 ── */
.lcd-wrap{
  width:100%;height:100%;
  pointer-events:auto;
  background:#ffffff;
  border-radius: 6px;
  overflow:hidden;
  position:relative;
  font-family:'Noto Sans KR',sans-serif;
  font-size:11px;
}
.lcd-wrap::after{
  content:'';position:absolute;top:0;left:0;right:0;height:35%;
  background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 100%);
  pointer-events:none;z-index:20;border-radius:3px 3px 0 0;
}

/* 헤더 */
.lcd-header{
  background:linear-gradient(180deg,#e4e4e4 0%,#d0d0d0 50%,#bcbcbc 100%);
  color:#222;font-size:10px;font-weight:700;letter-spacing:.3px;
  padding:0 8px;
  display:flex;align-items:center;justify-content:space-between;
  height:18px;position:relative;z-index:2;
  border-bottom:1px solid #a0a0a0;
  text-shadow:0 1px 0 rgba(255,255,255,.9);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
}
.lcd-header .h-title{flex:1;text-align:center;font-size:10.5px}
.lcd-header .h-icon{font-size:10px;min-width:14px;color:#555}
.lcd-header #hRight{color:#53bde5;font-size:9px}

/* 뷰 */
.lcd-view{position:absolute;top:15px;left:0;right:0;bottom:16px;overflow:hidden}
.lcd-view.hidden{display:none}

/* Now Playing */
.np-body{display:flex;gap:15px;padding:15px 15px 0;height:110px;align-items:flex-start}
.np-art{
  width:80px;height:80px;flex-shrink:0;border-radius:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:visible;
  transform: perspective(200px) rotateY(15deg);
  box-shadow:none;
  transition:background .5s ease;
}
.np-art-main{
  position:absolute;inset:0;overflow:hidden;border-radius:0;
  background:inherit;
}
.np-art-reflect{
  display:block;
  position:absolute;
  top:75%;
  left:0; width:100%; height:100%;
  transform:scaleY(-1);
  -webkit-mask-image:linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 50%);
  mask-image:linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 50%);
  pointer-events:none;
}
.np-art-reflect-inner{
  display:block;
  position:absolute;inset:0;overflow:hidden;
}
.np-art-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;font-size:22px;line-height:1}
.np-art-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:0;z-index:2;opacity:0;transition:opacity .4s ease;}
.np-art-img.loaded{opacity:1}
.np-art-reflect-img{display:none;}
.np-art-shine{display:none;}
.np-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;padding-top:2px}
.np-title{font-size:10px;font-weight:600;color:#182818;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.np-artist{font-size:9px;color:#4a5a4a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-vol-row{display:flex;align-items:center;gap:3px;margin-top:5px}
.vol-label{font-size:7.5px;color:#4a6a4a;font-family:monospace;flex-shrink:0}
.vol-track{flex:1;height:3px;background:rgba(0,0,0,.15);border-radius:2px;overflow:hidden}
.vol-fill{height:100%;background:#4060cc;border-radius:2px;transition:width .12s}
.np-bars{display:flex;align-items:flex-end;gap:1px;height:11px;margin-top:5px}
.np-bar{width:3px;background:#4060cc;border-radius:1px;animation:bar-bounce .7s ease infinite}
.np-bar:nth-child(1){animation-delay:0s;height:6px}
.np-bar:nth-child(2){animation-delay:.15s;height:10px}
.np-bar:nth-child(3){animation-delay:.3s;height:4px}
.np-bar:nth-child(4){animation-delay:.1s;height:8px}
.np-bar.paused{animation:none;height:3px!important}
@keyframes bar-bounce{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

.np-prog-row{display:flex;align-items:center;gap:2px;padding:0 15px;height:20px;margin-top:4px}
.prog-time{font-size:9px;color:#4a6a4a;font-family:monospace;font-weight:bold;flex-shrink:0;min-width:26px}
.prog-time:last-child{text-align:right}
.prog-track{flex:1;height:12px;background:linear-gradient(180deg,#e8e8e8,#ffffff,#efefef,#e8e8e8);border-radius:0px;border:0px solid #aaa;overflow:hidden;box-shadow:inset 0 0px 1px rgba(0,0,0,.15)}
.prog-fill{height:100%;background:linear-gradient(180deg,#91a3cf,#83a3d4,#6a96ca,#7fbae7);border-radius:0px;transition:width .6s linear;width:0%;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}

/* 트랙 캐러셀 */
.albums-scene{height:120px;position:relative;display:flex;align-items:center;justify-content:center;perspective:110px;overflow:visible;}
.album-card{position:absolute;width:80px;height:80px;border-radius:0;display:flex;align-items:center;justify-content:center;transform-style:preserve-3d;overflow:visible;box-shadow:none;}
.album-card-main{position:absolute;inset:0;overflow:hidden;border-radius:0;background:inherit;}
.album-card-reflect{
  display:block;
  position:absolute;
  top:75%;          /* 카드 바로 아래 */
  left:0; width:100%; height:100%;
  transform:scaleY(-1);           /* 상하 반전 */
  -webkit-mask-image:linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 70%);
  mask-image:linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 70%);
  pointer-events:none;
}
.album-card-reflect-inner{
  display:block;
  position:absolute;inset:0;overflow:hidden;
}
.album-card-shine{display:none;}
.card-thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:0;z-index:3;opacity:0;transition:opacity .35s ease;}
.card-thumb.loaded{opacity:1}
.albums-name{text-align:center;font-size:10px;font-weight:500;color:#2a3a2a;padding:10px 8px;height:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 상태바 */
.lcd-status{position:absolute;bottom:0;left:0;right:0;height:16px;padding:2px 7px;display:flex;justify-content:space-between;align-items:center;font-size:8px;color:rgba(0,0,0,.4);background:rgba(0,0,0,.05);font-family:monospace;z-index:2;}
.batt{display:flex;align-items:center;gap:1px}
.batt-body{width:16px;height:7px;border:1px solid rgba(0,0,0,.3);border-radius:1px;padding:1px}
.batt-fill{width:68%;height:100%;background:#4a8a3a;border-radius:1px}
.batt-nub{width:2px;height:3px;background:rgba(0,0,0,.3);border-radius:0 1px 1px 0}

/* 휠 버튼 */
#wheelShell{cursor:grab;}
#wheelShell:active{cursor:grabbing;}
#centerBtn{cursor:pointer;}
#centerBtn.pressed{opacity:.8;}
@keyframes ripple-svg{from{r:36;opacity:.6;}to{r:56;opacity:0;}}
.svg-ripple{animation:ripple-svg .4s ease-out forwards;}
</style>
</head>

function showView(name){
  appState=name;
  document.querySelectorAll('.lcd-view').forEach(v=>v.classList.add('hidden'));
  document.getElementById('view-'+name).classList.remove('hidden');
  document.getElementById('hTitle').textContent=name==='nowplaying'?'Now Playing':'Tracks';
  document.getElementById('hLeft').textContent =name==='nowplaying'?' ':'❮';
  document.getElementById('hRight').textContent=name==='nowplaying'&&isPlaying?'❚❚':'▶';
  if(name==='tracklist') openTracklist();
}

// ════════════════════════════════
// TRACK DATA
// ════════════════════════════════
function ensureTrackSlots(){
  let ids=[];
  if(ytReady) try{ids=ytPlayer.getPlaylist()||[];}catch(_){}
  const count=ids.length||Math.max(tracks.length,20);
  for(let i=0;i<count;i++){
    if(!tracks[i]) tracks[i]={title:null,id:ids[i]||null};
    else if(ids[i]) tracks[i].id=ids[i];
  }
  if(ids.length>0&&tracks.length>ids.length) tracks.length=ids.length;
}
function trackLabel(i){return(tracks[i]&&tracks[i].title)?tracks[i].title:`Track ${i+1}`;}

// ════════════════════════════════
// CAROUSEL
// ════════════════════════════════
let carouselAngle=0,carouselTarget=0,carouselRAF=null,trackCount=20;

function buildTrackCards(){
  const scene=document.getElementById('albumsScene');
  scene.innerHTML=''; carouselBuilt=true;
  for(let i=0;i<trackCount;i++){
    const card=document.createElement('div');
    card.className='album-card'; card.id='tcard-'+i;
    card.style.background=`linear-gradient(145deg,${trackColorLight(i)},${trackColor(i)})`;
    const bg=`linear-gradient(145deg,${trackColorLight(i)},${trackColor(i)})`;
    card.style.background='transparent';
    card.innerHTML=`
      <div class="album-card-main" id="tcard-main-${i}" style="background:${bg}">
        <img class="card-thumb" id="cthumb-${i}" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s;">
      </div>
      <div class="album-card-reflect">
        <div class="album-card-reflect-inner" id="tcard-rinner-${i}" style="background:${bg}">
          <img id="cthumb-ref-${i}" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s;">
        </div>
      </div>`;
    scene.appendChild(card);
  }
  loadAllCardThumbs();
}

function positionCards(angle){
  const N=trackCount; if(!N) return;
  const cur=((Math.round(angle)%N)+N)%N;
  document.getElementById('albumsName').textContent=trackLabel(cur);
  for(let i=0;i<N;i++){
    const card=document.getElementById('tcard-'+i); if(!card) continue;
    let off=i-angle; off=off-N*Math.round(off/N);
    const abs=Math.abs(off);
    if(abs>2.6){card.style.opacity='0';card.style.zIndex='0';continue;}
    const tx=off*50,tz=3*Math.max(0,1-abs),ry=-off*30;
    const sc=Math.max(0.3,1-abs*0.12),op=Math.max(0,1-abs*0.0);
    card.style.transform=`translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${sc})`;
    card.style.opacity=op; card.style.zIndex=Math.round(5-abs*2);
    card.style.outline=(i===currentIdx)?'2px solid rgba(255,240,140,.7)':'none';
  }
}

function tickCarousel(){
  const diff=carouselTarget-carouselAngle;
  if(Math.abs(diff)<0.001){carouselAngle=carouselTarget;positionCards(carouselAngle);carouselRAF=null;return;}
  carouselAngle+=diff*0.09;
  positionCards(carouselAngle);
  carouselRAF=requestAnimationFrame(tickCarousel);
}
function spinCarousel(dir){
  const N=trackCount; trackIdx=((trackIdx+dir)%N+N)%N; carouselTarget+=dir;
  if(!carouselRAF) carouselRAF=requestAnimationFrame(tickCarousel);
  if(navigator.vibrate) navigator.vibrate(6);
}
function jumpCarouselTo(idx){
  const N=trackCount; if(!N) return;
  idx=((idx%N)+N)%N; trackIdx=idx;
  let diff=idx-(((Math.round(carouselAngle)%N)+N)%N);
  if(diff>N/2) diff-=N; if(diff<-N/2) diff+=N;
  carouselTarget=carouselAngle+diff;
  if(!carouselRAF) carouselRAF=requestAnimationFrame(tickCarousel);
}
function openTracklist(){
  ensureTrackSlots();
  const nc=Math.max(tracks.length,1);
  if(nc!==trackCount||!carouselBuilt){trackCount=nc;buildTrackCards();}
  jumpCarouselTo(currentIdx);
}
function updateTrackCardTitle(idx,title){
  if(!tracks[idx]) tracks[idx]={title:null,id:null};
  tracks[idx].title=title;
  if(appState==='tracklist'){
    const N=trackCount,cur=((Math.round(carouselAngle)%N)+N)%N;
    if(cur===idx) document.getElementById('albumsName').textContent=title;
  }
}

// ════════════════════════════════
// THUMBNAILS
// ════════════════════════════════
function thumbUrl(id,q){return `https://img.youtube.com/vi/${id}/${q||'mqdefault'}.jpg`;}
function setNPThumb(vid){
  const img=document.getElementById('npArtImg');
  const rimg=document.getElementById('npArtReflectImg');
  if(!vid){img.classList.remove('loaded');if(rimg)rimg.classList.remove('loaded');return;}
  if(img.dataset.vid===vid) return;
  const url=thumbUrl(vid,'mqdefault');
  img.dataset.vid=vid;
  img.onload=()=>img.classList.add('loaded');
  img.onerror=()=>img.classList.remove('loaded');
  img.src=url;
  if(rimg){
    rimg.dataset.vid=vid;
    rimg.onload=()=>rimg.classList.add('loaded');
    rimg.src=url;
  }
}
function setCardThumb(ci,vid){
  if(!vid) return;
  const url=thumbUrl(vid,'default');
  const img=document.getElementById('cthumb-'+ci);
  if(img&&img.dataset.vid!==vid){
    img.dataset.vid=vid;
    img.onload=()=>{img.style.opacity=1;};
    img.src=url;
  }
  const rimg=document.getElementById('cthumb-ref-'+ci);
  if(rimg&&rimg.dataset.vid!==vid){
    rimg.dataset.vid=vid;
    rimg.onload=()=>{rimg.style.opacity=1;};
    rimg.src=url;
  }
}
function loadAllCardThumbs(){
  if(!ytReady) return;
  let ids=[]; try{ids=ytPlayer.getPlaylist()||[];}catch(_){}
  ids.forEach((v,i)=>{if(v) setCardThumb(i,v);});
}

// ════════════════════════════════
// NOW PLAYING ART
// ════════════════════════════════
function updateNPArt(idx){
  const bg=`linear-gradient(145deg,${trackColorLight(idx)},${trackColor(idx)})`;
  const main=document.getElementById('npArtMain');
  const ref=document.getElementById('npArtReflectInner');
  if(main) main.style.background=bg;
  if(ref)  ref.style.background=bg;
  document.getElementById('npArt').style.background='transparent';
  document.getElementById('npIcon').textContent='♪';
  const img=document.getElementById('npArtImg');
  img.classList.remove('loaded'); img.dataset.vid='';
  const rimg=document.getElementById('npArtReflectImg');
  if(rimg){rimg.classList.remove('loaded'); rimg.src='';}
}

// ════════════════════════════════
// WHEEL — touch/pointer 직접 처리 (jQuery Knob 대신)
// ════════════════════════════════
(function setupWheel(){
  const wheelEl = document.getElementById('wheelShell');
  let lastAngle = null;
  let accumDeg  = 0;
  const THRESHOLD = 18; // degrees per tick

  function getAngle(x, y){
    const r  = wheelEl.getBoundingClientRect();
    const cx = r.left + r.width/2;
    const cy = r.top  + r.height/2;
    return Math.atan2(y-cy, x-cx) * 180 / Math.PI;
  }

  function onStart(x, y){
    lastAngle  = getAngle(x, y);
    accumDeg   = 0;
    wheelDragged = false;
  }

  function onMove(x, y){
    if(lastAngle === null) return;
    let diff = getAngle(x, y) - lastAngle;
    // wrap -180..180
    if(diff >  180) diff -= 360;
    if(diff < -180) diff += 360;
    accumDeg += diff;
    lastAngle = getAngle(x, y);
    if(Math.abs(accumDeg) >= THRESHOLD){
      const dir = accumDeg > 0 ? 1 : -1;
      onWheelTurn(dir);
      accumDeg = 0;
      wheelDragged = true;
    }
  }

  function onEnd(x, y){
    if(!wheelDragged) fireZone(x, y);
    lastAngle  = null;
    wheelDragged = false;
  }

  // Mouse
  wheelEl.addEventListener('mousedown', e=>{onStart(e.clientX,e.clientY);e.preventDefault();});
  window.addEventListener('mousemove',  e=>{if(lastAngle!==null) onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',    e=>{if(lastAngle!==null) onEnd(e.clientX,e.clientY);});

  // Touch
  wheelEl.addEventListener('touchstart', e=>{
    const t=e.touches[0]; onStart(t.clientX,t.clientY); e.preventDefault();
  },{passive:false});
  wheelEl.addEventListener('touchmove',  e=>{
    const t=e.touches[0]; onMove(t.clientX,t.clientY);  e.preventDefault();
  },{passive:false});
  wheelEl.addEventListener('touchend',   e=>{
    const t=e.changedTouches[0]; onEnd(t.clientX,t.clientY);
  });
})();

// 센터 버튼
document.getElementById('centerBtn').addEventListener('click', ()=>setTimeout(onCenter,50));
document.getElementById('centerBtn').addEventListener('touchend', e=>{
  e.preventDefault(); setTimeout(onCenter,50);
});

// ════════════════════════════════
// BUTTON ACTIONS
// ════════════════════════════════
function onWheelTurn(dir){
  if(appState==='tracklist'){spinCarousel(dir);}
  else{
    volume=Math.max(0,Math.min(100,volume+dir*6));
    document.getElementById('volFill').style.width=volume+'%';
    applyVolume();
    if(navigator.vibrate) navigator.vibrate(3);
  }
}

function onCenter(){
  ripple();
  if(navigator.vibrate) navigator.vibrate([8,25,8]);
  if(appState==='tracklist'){
    currentIdx=trackIdx; updateNPArt(currentIdx);
    document.getElementById('npTitle').textContent=trackLabel(currentIdx);
    document.getElementById('npArtist').textContent=`Track ${currentIdx+1}`;
    showView('nowplaying');
    if(ytReady) try{ytPlayer.playVideoAt(currentIdx);}catch(_){}
  } else {togglePlay();}
}
function onMenu(){ if(navigator.vibrate)navigator.vibrate(6); showView(appState==='nowplaying'?'tracklist':'nowplaying'); }
function onPrev(){ if(navigator.vibrate)navigator.vibrate(6); appState==='nowplaying'?prevTrack():spinCarousel(-1); }
function onNext(){ if(navigator.vibrate)navigator.vibrate(6); appState==='nowplaying'?nextTrack():spinCarousel(+1); }
function onPlayPauseBtn(){ if(appState==='tracklist'){onCenter();return;} togglePlay(); }

// 리플 (SVG circle 애니메이션)
function ripple(){
  const btn=document.getElementById('centerBtn');
  btn.classList.add('pressed');
  const svg=document.getElementById('ipod-svg');
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx','329'); c.setAttribute('cy','349.33'); c.setAttribute('r','36');
  c.setAttribute('fill','none'); c.setAttribute('stroke','rgba(100,160,255,.5)'); c.setAttribute('stroke-width','2');
  c.classList.add('svg-ripple');
  svg.appendChild(c);
  setTimeout(()=>{c.remove();btn.classList.remove('pressed');},420);
}

// 탭 존 판별
function fireZone(x, y){
  const el=document.getElementById('wheelShell');
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const dx=x-cx, dy=y-cy;
  // 가운데 버튼 반경 (SVG 상 33.45 / 86.6 ≒ 38%)
  if(Math.hypot(dx,dy) < r.width*0.38) return;
  const a=Math.atan2(dy,dx)*180/Math.PI;
  if     (a>=-135&&a<=-45) onMenu();
  else if(a>-45&&a<45)     onNext();
  else if(a>=45&&a<=135)   onPlayPauseBtn();
  else                      onPrev();
}

// ════════════════════════════════
// YOUTUBE
// ════════════════════════════════
let ytPlayer=null,ytReady=false,infoTimer=null,progTimer=null,shuffled=false;

window.onYouTubeIframeAPIReady=()=>{
  ytPlayer=new YT.Player('yt-player',{
    playerVars:{autoplay:1,controls:0,rel:0,modestbranding:1,iv_load_policy:3,playsinline:1},
    events:{
      onReady:()=>{
        ytReady=true;
        try{
          ytPlayer.mute(); // 먼저 음소거
          ytPlayer.setVolume(volume);
          ytPlayer.loadPlaylist({listType:'playlist',list:PLAYLIST_ID,index:0});
          setTimeout(()=>{
            const total = ytPlayer.getPlaylist()?.length || 1;
            const randIdx = Math.floor(Math.random() * total);
            ytPlayer.playVideoAt(randIdx);
            ytPlayer.unMute(); // 랜덤 곡으로 이동 후 음소거 해제
            ytPlayer.setVolume(volume);
          }, 1000);
        }catch(_){}
      },
      onStateChange:onYTState
    }
  });
};

function onYTState(e){
  const S=YT.PlayerState;
  if(e.data===S.PLAYING&&!shuffled){
    shuffled=true;ensureTrackSlots();trackCount=tracks.length||20;
    try{ytPlayer.setShuffle(true);}catch(_){}
    setTimeout(loadAllCardThumbs,400);
  }
  if(e.data===S.PLAYING) {setPlay(true);startTimers();updateCurrentIdx();applyVolume();}
  if(e.data===S.PAUSED)  {setPlay(false);stopTimers();}
  if(e.data===S.ENDED)   {nextTrack();}
  if(e.data===S.BUFFERING){document.getElementById('npTitle').textContent='Loading...';}
}

function applyVolume(){if(!ytReady)return;try{ytPlayer.setVolume(volume);}catch(_){}try{ytPlayer.unMute();}catch(_){}}

function updateCurrentIdx(){
  if(!ytReady)return;
  try{const idx=ytPlayer.getPlaylistIndex();if(idx>=0){currentIdx=idx;updateNPArt(idx);if(appState==='tracklist')positionCards(carouselAngle);}}catch(_){}
}

function setPlay(p){
  isPlaying=p;
  document.querySelectorAll('.np-bar').forEach(b=>b.classList.toggle('paused',!p));
  if(appState==='nowplaying') document.getElementById('hRight').textContent=p?'❚❚':'▶';
}

function startTimers(){stopTimers();updateInfo();infoTimer=setInterval(updateInfo,1800);progTimer=setInterval(updateProg,800);}
function stopTimers(){clearInterval(infoTimer);clearInterval(progTimer);}

function updateInfo(){
  if(!ytReady||!ytPlayer.getVideoData)return;
  try{
    const d=ytPlayer.getVideoData();if(!d||!d.title)return;
    document.getElementById('npTitle').textContent=d.title||'—';
    document.getElementById('npArtist').textContent=d.author||'—';
    if(d.video_id) setNPThumb(d.video_id);
    const idx=ytPlayer.getPlaylistIndex();
    if(idx>=0){updateTrackCardTitle(idx,d.title);if(d.video_id)setCardThumb(idx,d.video_id);}
  }catch(_){}
}

function updateProg(){
  if(!ytReady)return;
  try{
    const cur=ytPlayer.getCurrentTime()||0,dur=ytPlayer.getDuration()||0;
    document.getElementById('npCur').textContent=fmt(cur);
    document.getElementById('npRem').textContent=dur>0?'-'+fmt(dur-cur):'-0:00';
    document.getElementById('progFill').style.width=dur>0?(cur/dur*100)+'%':'0%';
  }catch(_){}
}

function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function togglePlay(){if(!ytReady)return;try{isPlaying?ytPlayer.pauseVideo():ytPlayer.playVideo();}catch(_){}}
function nextTrack(){if(ytReady)try{ytPlayer.nextVideo();}catch(_){}}
function prevTrack(){if(ytReady)try{ytPlayer.previousVideo();}catch(_){}}

// YouTube API 로드
const _s=document.createElement('script');
_s.src='https://www.youtube.com/iframe_api';
document.head.appendChild(_s);


// iOS 보정 스크립트 제거됨 (foreignObject → CSS overlay 방식으로 변경)

// 초기화
updateNPArt(0);
</script>
