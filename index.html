<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mood Player</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:#111;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans KR',sans-serif;
  overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;
}

/* ── iPOD BODY ── */
.ipod{
  width:240px;
  background:linear-gradient(170deg,#fafaff 0%,#e8e8e8 45%,#d0d0ce 100%);
  border-radius:30px;padding:14px 14px 22px;position:relative;
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.9),inset 0 -2px 3px rgba(0,0,0,.15),
    0 4px 12px rgba(0,0,0,.5);

  /* ↓ 여기서 스케일 조절. 1.0 = 원본, 1.2 = 20% 크게, 1.4 = 40% 크게 */
  zoom: 1.2;
}
.ipod::before{
  content:'';position:absolute;top:0;left:0;right:0;height:55%;
  border-radius:30px 30px 60% 60%;
  background:linear-gradient(180deg,rgba(255,255,255,.5) 0%,transparent 100%);
  pointer-events:none;z-index:10;
}
.ipod::after{
  content:'';position:absolute;inset:0;border-radius:30px;
  border:1px solid rgba(255,255,255,.6);pointer-events:none;z-index:11;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);
}

/* ── LCD BEZEL ── */
.screen-bezel{
  background:#111;border-radius:8px;padding:2px;margin-bottom:14px;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,.3);
}
.lcd{
  width:100%;height:162px;border-radius:6px;overflow:hidden;position:relative;
  background: linear-gradient(180deg,#c0d8b8 0%,#a8c8a0 100%);
}
.lcd::after{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 100%);
  pointer-events:none;z-index:20;
}

/* ── LCD HEADER ── */
.lcd-header{
  background:linear-gradient(180deg,#4466bb 0%,#2244aa 100%);
  color:#fff;font-size:10.5px;font-weight:600;
  padding:3px 8px;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:2;height:18px;
}
.lcd-header .h-title{flex:1;text-align:center}
.lcd-header .h-icon{font-size:9px;opacity:.8;min-width:12px}

/* ── LCD VIEWS ── */
.lcd-view{position:absolute;top:18px;left:0;right:0;bottom:16px;overflow:hidden}
.lcd-view.hidden{display:none}

/* ── MENU VIEW ── */
.lcd-menu{padding:1px 0}
.lcd-row{
  display:flex;align-items:center;padding:4px 7px;gap:6px;
  font-size:11px;color:#182818;font-weight:400;line-height:1.2;
}
.lcd-row .r-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.lcd-row .r-name{flex:1}
.lcd-row .r-arr{font-size:10px;color:#6a8a6a;flex-shrink:0}
.lcd-row.active{background:#2244aa;color:#fff;border-radius:2px}
.lcd-row.active .r-arr{color:rgba(255,255,255,.7)}

/* ── NOW PLAYING VIEW ── */
.np-body{display:flex;gap:7px;padding:5px 7px 3px;height:90px;align-items:flex-start}
.np-art{
  width:54px;height:66px;flex-shrink:0;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.25),0 2px 8px rgba(0,0,0,.3);
  transition:background .6s ease;
}
.np-art-lines{ display:none; }
.np-art-shine{
  position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 100%);
  pointer-events:none;z-index:3;
}
.np-art-icon{position:relative;z-index:1;font-size:22px;line-height:1}
/* YouTube thumbnail fills the art box */
.np-art-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:2;
  opacity:0;transition:opacity .4s ease;
}
.np-art-img.loaded{opacity:1}
.np-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;padding-top:2px}
.np-title{
  font-size:10px;font-weight:600;color:#182818;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.np-artist{font-size:9px;color:#4a6a4a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-vol-row{display:flex;align-items:center;gap:3px;margin-top:5px}
.vol-label{font-size:7.5px;color:#4a6a4a;font-family:monospace;flex-shrink:0}
.vol-track{flex:1;height:4px;background:rgba(0,0,0,.12);border-radius:2px;overflow:hidden}
.vol-fill{height:100%;background:#2244aa;border-radius:2px;transition:width .12s}
.np-bars{display:flex;align-items:flex-end;gap:1px;height:11px;margin-top:5px}
.np-bar{width:3px;background:#2244aa;border-radius:1px;animation:bar-bounce .7s ease infinite}
.np-bar:nth-child(1){animation-delay:0s;height:6px}
.np-bar:nth-child(2){animation-delay:.15s;height:10px}
.np-bar:nth-child(3){animation-delay:.3s;height:4px}
.np-bar:nth-child(4){animation-delay:.1s;height:8px}
.np-bar.paused{animation:none;height:3px!important}
@keyframes bar-bounce{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

.np-prog-row{
  display:flex;align-items:center;gap:4px;padding:0 7px 0;height:20px;
}
.prog-time{font-size:7.5px;color:#4a6a4a;font-family:monospace;flex-shrink:0;min-width:26px}
.prog-time:last-child{text-align:right}
.prog-track{flex:1;height:4px;background:rgba(0,0,0,.12);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#2244aa;border-radius:2px;transition:width .6s linear;width:0%}

/* ── ALBUMS VIEW ── */
.albums-scene{
  height:92px;position:relative;
  display:flex;align-items:center;justify-content:center;
  perspective:250px;overflow:visible;
}
.album-card{
  position:absolute;width:54px;height:66px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s ease;
  transform-style:preserve-3d;overflow:hidden;
  box-shadow:2px 4px 12px rgba(0,0,0,.45);cursor:pointer;
}
.album-card-lines{ display:none; }
.album-card-shine{
  position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 100%);pointer-events:none;z-index:4;
}
.album-icon{position:relative;z-index:1}
.card-thumb{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:3;
  opacity:0;transition:opacity .35s ease;
}
.card-thumb.loaded{ opacity:1; }
.albums-name{
  text-align:center;font-size:10.5px;font-weight:600;color:#182818;
  padding:2px 8px;letter-spacing:.3px;height:20px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── LCD STATUS ── */
.lcd-status{
  position:absolute;bottom:0;left:0;right:0;height:16px;
  padding:2px 7px;display:flex;justify-content:space-between;align-items:center;
  font-size:8px;color:rgba(0,0,0,.4);background:rgba(0,0,0,.06);
  font-family:monospace;z-index:2;
}
.batt{display:flex;align-items:center;gap:1px}
.batt-body{width:16px;height:7px;border:1px solid rgba(0,0,0,.35);border-radius:1px;padding:1px}
.batt-fill{width:68%;height:100%;background:#3a8a3a;border-radius:1px}
.batt-nub{width:2px;height:3px;background:rgba(0,0,0,.3);border-radius:0 1px 1px 0}

/* ── CLICK WHEEL ── */
.wheel-section{display:flex;align-items:center;justify-content:center}
.wheel-shell{
  width:170px;height:170px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#e0e0de 0%,#c8c8c6 40%,#b0b0ae 70%,#a0a0a0 100%);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.7),inset 0 -2px 4px rgba(0,0,0,.2),
    0 4px 14px rgba(0,0,0,.35),0 2px 4px rgba(0,0,0,.2);
  position:relative;display:flex;align-items:center;justify-content:center;cursor:grab;
}
.wheel-shell::before{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 50%,rgba(0,0,0,.1) 100%);
  pointer-events:none;
}
.wheel-shell:active{cursor:grabbing}
.knob-wrap{
  position:absolute;inset:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;z-index:2;
}
.knob-wrap canvas{pointer-events:none}
.wl{
  position:absolute;font-weight:600;color:#888;letter-spacing:.5px;
  pointer-events:none;z-index:3;text-transform:uppercase;
}
.wl-top   {font-size:8.5px;top:7px;  left:50%;transform:translateX(-50%)}
.wl-left  {font-size:13px; left:8px; top:50%; transform:translateY(-50%)}
.wl-right {font-size:13px; right:8px;top:50%; transform:translateY(-50%)}
.wl-bottom{font-size:12px; bottom:7px;left:50%;transform:translateX(-50%)}
.center-btn{
  position:absolute;width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%,#f4f4f2 0%,#dcdcda 55%,#cacac8 100%);
  box-shadow:
    inset 0 1px 3px rgba(255,255,255,.8),inset 0 -1px 3px rgba(0,0,0,.15),
    0 3px 8px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.2);
  cursor:pointer;z-index:10;transition:transform .1s,box-shadow .1s;
}
.center-btn.pressed,.center-btn:active{
  transform:scale(.94);box-shadow:inset 0 2px 5px rgba(0,0,0,.2),0 1px 3px rgba(0,0,0,.15);
}
.ipod-logo{text-align:center;margin-top:-8px;margin-bottom:6px;font-size:9px;letter-spacing:2.5px;color:#aaa}
@keyframes ripple{from{transform:scale(.8);opacity:.5}to{transform:scale(1.15);opacity:0}}
.ripple-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:2px solid rgba(100,160,255,.6);animation:ripple .4s ease-out forwards;pointer-events:none;
}
/* body::after noise removed */
</style>
</head>
<body>

<div class="ipod">
  <div class="screen-bezel">
    <div class="lcd">
      <div class="lcd-header">
        <span class="h-icon" id="hLeft">&nbsp;</span>
        <span class="h-title" id="hTitle">Now Playing</span>
        <span class="h-icon" id="hRight">▶</span>
      </div>

      <!-- NOW PLAYING (default — loads on NFC tap) -->
      <div class="lcd-view" id="view-nowplaying">
        <div class="np-body">
          <div class="np-art" id="npArt">
            <div class="np-art-lines"></div>
            <span class="np-art-icon" id="npIcon">♪</span>
            <img class="np-art-img" id="npArtImg" src="" alt="">
            <div class="np-art-shine"></div>
          </div>
          <div class="np-info">
            <div class="np-title" id="npTitle">Tap ▶ to play</div>
            <div class="np-artist" id="npArtist">Calm Mood</div>
            <div class="np-vol-row">
              <span class="vol-label">vol</span>
              <div class="vol-track"><div class="vol-fill" id="volFill" style="width:70%"></div></div>
            </div>
            <div class="np-bars" id="npBars">
              <div class="np-bar paused"></div>
              <div class="np-bar paused"></div>
              <div class="np-bar paused"></div>
              <div class="np-bar paused"></div>
            </div>
          </div>
        </div>
        <div class="np-prog-row">
          <span class="prog-time" id="npCur">0:00</span>
          <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
          <span class="prog-time" id="npRem">-0:00</span>
        </div>
      </div>

      <!-- MENU -->

      <!-- TRACK LIST CAROUSEL -->
      <div class="lcd-view hidden" id="view-tracklist">
        <div class="albums-scene" id="albumsScene"></div>
        <div class="albums-name" id="albumsName">Track 1</div>
      </div>

      <div class="lcd-status">
        <span id="lcdClock">--:--</span>
        <div class="batt"><div class="batt-body"><div class="batt-fill"></div></div><div class="batt-nub"></div></div>
      </div>
    </div>
  </div>

  <div class="ipod-logo">&nbsp;</div>

  <div class="wheel-section">
    <div class="wheel-shell" id="wheelShell">
      <div class="knob-wrap" id="knobWrap">
        <input class="ipod-knob" type="text" value="0">
      </div>
      <span class="wl wl-top">MENU</span>
      <span class="wl wl-left">◄◄</span>
      <span class="wl wl-right">►►</span>
      <span class="wl wl-bottom">► ‖</span>
      <div class="center-btn" id="centerBtn"></div>
    </div>
  </div>
</div>

<!-- YouTube off-screen (must be in real DOM for API) -->
<div style="position:fixed;bottom:-240px;right:-440px;width:320px;height:200px;overflow:hidden;">
  <div id="yt-player"></div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG — 플레이리스트 ID만 바꾸면 됩니다
// ══════════════════════════════════════════════
const PLAYLIST_ID = 'PLmyAPRLQRJ6lMbAdXYGuyZ627Y9RoX25i';

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let appState      = 'nowplaying';  // 'nowplaying' | 'tracklist'
let trackIdx      = 0;             // carousel 선택 인덱스
let currentIdx    = 0;             // 실제 재생 중 인덱스
let tracks        = [];            // [{ title, id }]
let volume        = 70;
let wheelDragged  = false;
let isPlaying     = false;
let carouselBuilt = false;

// ══════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════
(function clock() {
  const d = new Date();
  document.getElementById('lcdClock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  setTimeout(clock, 15000);
})();

// ══════════════════════════════════════════════
// COLOR — 트랙 인덱스로 고유 색상
// ══════════════════════════════════════════════
const HUES = [210, 30, 270, 150, 330, 50, 190, 15, 250, 120, 170, 60, 300, 90, 230];
function trackColor(i)      { return `hsl(${HUES[i%HUES.length]}, 55%, 32%)`; }
function trackColorLight(i) { return `hsl(${HUES[i%HUES.length]}, 60%, 58%)`; }

// ══════════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════════
function showView(name) {
  appState = name;
  document.querySelectorAll('.lcd-view').forEach(v => v.classList.add('hidden'));
  document.getElementById('view-' + name).classList.remove('hidden');
  document.getElementById('hTitle').textContent = name === 'nowplaying' ? 'Now Playing' : 'Tracks';
  document.getElementById('hLeft').textContent  = name === 'nowplaying' ? '\u00a0' : '‹';
  document.getElementById('hRight').textContent = name === 'nowplaying' && isPlaying ? '‖' : '▶';
  if (name === 'tracklist') openTracklist();
}

// ══════════════════════════════════════════════
// TRACK DATA
// ══════════════════════════════════════════════
function ensureTrackSlots() {
  let ids = [];
  if (ytReady) try { ids = ytPlayer.getPlaylist() || []; } catch(_){}
  const count = ids.length || Math.max(tracks.length, 20);
  for (let i = 0; i < count; i++) {
    if (!tracks[i]) tracks[i] = { title: null, id: ids[i] || null };
    else if (ids[i]) tracks[i].id = ids[i];
  }
  // trim excess
  if (ids.length > 0 && tracks.length > ids.length) tracks.length = ids.length;
}

function trackLabel(i) {
  return (tracks[i] && tracks[i].title) ? tracks[i].title : `Track ${i + 1}`;
}

// ══════════════════════════════════════════════
// 3D CAROUSEL — smooth rAF engine
// ══════════════════════════════════════════════
let carouselAngle  = 0;
let carouselTarget = 0;
let carouselRAF    = null;
let trackCount     = 20;

function buildTrackCards() {
  const scene = document.getElementById('albumsScene');
  scene.innerHTML = '';
  carouselBuilt = true;
  for (let i = 0; i < trackCount; i++) {
    const card = document.createElement('div');
    card.className = 'album-card';
    card.id = 'tcard-' + i;
    card.style.background = `linear-gradient(145deg, ${trackColorLight(i)}, ${trackColor(i)})`;
    card.innerHTML = `
      <div class="album-card-lines"></div>
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 4px">
        <span style="font-size:18px;line-height:1">♪</span>
        <span id="tcard-num-${i}" style="font-size:8px;color:rgba(255,255,255,.85);font-family:monospace;font-weight:600">${i+1}</span>
      </div>
      <div class="album-card-shine"></div>`;
    scene.appendChild(card);
  }
  // load thumbs for cards whose video IDs we already know
  loadAllCardThumbs();
}

function positionCards(angle) {
  const N   = trackCount;
  if (N === 0) return;
  const cur = ((Math.round(angle) % N) + N) % N;
  document.getElementById('albumsName').textContent = trackLabel(cur);

  for (let i = 0; i < N; i++) {
    const card = document.getElementById('tcard-' + i);
    if (!card) continue;
    let off = i - angle;
    off = off - N * Math.round(off / N);
    const abs = Math.abs(off);
    if (abs > 2.6) { card.style.opacity='0'; card.style.zIndex='0'; continue; }
    const tx = off * 62;
    const tz = 25 * Math.max(0, 1 - abs);
    const ry = -off * 28;
    const sc = Math.max(0.6, 1 - abs * 0.15);
    const op = Math.max(0, 1 - abs * 0.28);
    card.style.transform = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${sc})`;
    card.style.opacity   = op;
    card.style.zIndex    = Math.round(5 - abs * 2);
    // 현재 재생 중인 카드 강조
    card.style.outline   = (i === currentIdx) ? '2px solid rgba(255,240,140,.7)' : 'none';
  }
}

function tickCarousel() {
  const diff = carouselTarget - carouselAngle;
  if (Math.abs(diff) < 0.001) {
    carouselAngle = carouselTarget;
    positionCards(carouselAngle);
    carouselRAF = null;
    return;
  }
  carouselAngle += diff * 0.25;  // ← 이 숫자: 낮을수록 부드럽게(0.05~0.15)
  positionCards(carouselAngle);
  carouselRAF = requestAnimationFrame(tickCarousel);
}

function spinCarousel(dir) {
  const N = trackCount;
  trackIdx = ((trackIdx + dir) % N + N) % N;
  carouselTarget += dir;
  if (!carouselRAF) carouselRAF = requestAnimationFrame(tickCarousel);
  if (navigator.vibrate) navigator.vibrate(6);
}

function jumpCarouselTo(idx) {
  const N = trackCount;
  if (N === 0) return;
  idx = ((idx % N) + N) % N;
  trackIdx = idx;
  let diff = idx - (((Math.round(carouselAngle) % N) + N) % N);
  if (diff > N/2) diff -= N;
  if (diff < -N/2) diff += N;
  carouselTarget = carouselAngle + diff;
  if (!carouselRAF) carouselRAF = requestAnimationFrame(tickCarousel);
}

function openTracklist() {
  ensureTrackSlots();
  const newCount = Math.max(tracks.length, 1);
  if (newCount !== trackCount || !carouselBuilt) {
    trackCount = newCount;
    buildTrackCards();
  }
  jumpCarouselTo(currentIdx);
}

function updateTrackCardTitle(idx, title) {
  if (!tracks[idx]) tracks[idx] = { title: null, id: null };
  tracks[idx].title = title;
  if (appState === 'tracklist') {
    const N = trackCount;
    const cur = ((Math.round(carouselAngle) % N) + N) % N;
    if (cur === idx) document.getElementById('albumsName').textContent = title;
  }
}

// ══════════════════════════════════════════════
// THUMBNAIL HELPERS
// ══════════════════════════════════════════════
function thumbUrl(videoId, quality) {
  // quality: mqdefault (320×180), hqdefault (480×360), default (120×90)
  return `https://img.youtube.com/vi/${videoId}/${quality||'mqdefault'}.jpg`;
}

function setNPThumb(videoId) {
  const img = document.getElementById('npArtImg');
  if (!videoId) { img.classList.remove('loaded'); return; }
  const url = thumbUrl(videoId, 'mqdefault');
  if (img.dataset.vid === videoId) return; // already set
  img.dataset.vid = videoId;
  img.onload  = () => img.classList.add('loaded');
  img.onerror = () => img.classList.remove('loaded');
  img.src = url;
}

function setCardThumb(cardIdx, videoId) {
  if (!videoId) return;
  const card = document.getElementById('tcard-' + cardIdx);
  if (!card) return;
  let img = card.querySelector('.card-thumb');
  if (!img) {
    img = document.createElement('img');
    img.className = 'card-thumb';
    img.onload  = () => img.classList.add('loaded');
    img.onerror = () => {};
    card.appendChild(img);
  }
  if (img.dataset.vid === videoId) return;
  img.dataset.vid = videoId;
  img.src = thumbUrl(videoId, 'default'); // small 120×90 for cards
}

// Batch-load thumbnails for all cards when playlist IDs are available
function loadAllCardThumbs() {
  if (!ytReady) return;
  let ids = [];
  try { ids = ytPlayer.getPlaylist() || []; } catch(_) {}
  ids.forEach((vid, i) => {
    if (vid) setCardThumb(i, vid);
  });
}

// ══════════════════════════════════════════════
// NOW PLAYING ART
// ══════════════════════════════════════════════
function updateNPArt(idx) {
  // fallback colour (shown while thumb loads)
  document.getElementById('npArt').style.background =
    `linear-gradient(145deg, ${trackColorLight(idx)}, ${trackColor(idx)})`;
  document.getElementById('npIcon').textContent = '♪';
  // clear old thumb until new one loads
  const img = document.getElementById('npArtImg');
  img.classList.remove('loaded');
  img.dataset.vid = '';
}

// ══════════════════════════════════════════════
// WHEEL TURN
// ══════════════════════════════════════════════
function onWheelTurn(dir) {
  if (appState === 'tracklist') {
    spinCarousel(dir);
  } else {
    volume = Math.max(0, Math.min(100, volume + dir * 6));
    document.getElementById('volFill').style.width = volume + '%';
    applyVolume();
    if (navigator.vibrate) navigator.vibrate(3);
  }
}

// ══════════════════════════════════════════════
// BUTTON ACTIONS
// ══════════════════════════════════════════════
function onCenter() {
  ripple();
  if (navigator.vibrate) navigator.vibrate([8, 25, 8]);
  if (appState === 'tracklist') {
    currentIdx = trackIdx;
    updateNPArt(currentIdx);
    document.getElementById('npTitle').textContent  = trackLabel(currentIdx);
    document.getElementById('npArtist').textContent = `Track ${currentIdx + 1}`;
    showView('nowplaying');
    if (ytReady) try { ytPlayer.playVideoAt(currentIdx); } catch(_) {}
  } else {
    togglePlay();
  }
}

function onMenu() {
  if (navigator.vibrate) navigator.vibrate(6);
  showView(appState === 'nowplaying' ? 'tracklist' : 'nowplaying');
}

function onPrev() {
  if (navigator.vibrate) navigator.vibrate(6);
  if (appState === 'nowplaying') prevTrack();
  else spinCarousel(-1);
}

function onNext() {
  if (navigator.vibrate) navigator.vibrate(6);
  if (appState === 'nowplaying') nextTrack();
  else spinCarousel(+1);
}

function onPlayPauseBtn() {
  if (appState === 'tracklist') { onCenter(); return; }
  togglePlay();
}

// ══════════════════════════════════════════════
// RIPPLE
// ══════════════════════════════════════════════
function ripple() {
  const btn = document.getElementById('centerBtn');
  btn.classList.add('pressed');
  const ring = document.createElement('div');
  ring.className = 'ripple-ring';
  btn.appendChild(ring);
  setTimeout(() => ring.remove(), 420);
  setTimeout(() => btn.classList.remove('pressed'), 140);
}

// ══════════════════════════════════════════════
// JQUERY KNOB + TAP ZONES
// ══════════════════════════════════════════════
$(function() {
  let kv, up=0, dn=0;
  $(".ipod-knob").knob({
    min:0, max:20, stopper:false, cursor:true,
    thickness:0.38, width:170, height:170,
    fgColor:"rgba(0,0,0,0)", bgColor:"rgba(0,0,0,0)",
    displayInput:false,
    change: function() {
      wheelDragged = true;
      if (kv > this.cv) { if(up){onWheelTurn(-1);up=0}else{up=1;dn=0} }
      else if (kv < this.cv) { if(dn){onWheelTurn(+1);dn=0}else{dn=1;up=0} }
      kv = this.cv;
    }
  });
  const $cv = $('#knobWrap canvas');
  $cv.css({ position:'absolute', top:0, left:0, width:'170px', height:'170px', opacity:0, cursor:'grab' });
  $cv.css('pointer-events', 'auto');
  $('#centerBtn').on('mousedown touchstart', e => e.stopPropagation());

  let tx0=0, ty0=0;
  $cv.on('mousedown touchstart', function(e) {
    wheelDragged = false;
    const pt = e.originalEvent.touches ? e.originalEvent.touches[0] : e;
    tx0 = pt.clientX; ty0 = pt.clientY;
  });
  $cv.on('click', function(e) {
    if (wheelDragged) { wheelDragged = false; return; }
    fireZone(e.clientX, e.clientY);
  });
  $cv.on('touchend', function(e) {
    const t = e.originalEvent.changedTouches[0];
    if (Math.hypot(t.clientX-tx0, t.clientY-ty0) < 14 && !wheelDragged) fireZone(t.clientX, t.clientY);
    wheelDragged = false;
  });
});

function fireZone(x, y) {
  const rect = document.getElementById('wheelShell').getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const dx = x-cx, dy = y-cy;
  if (Math.hypot(dx, dy) < 42) return;
  const a = Math.atan2(dy, dx) * 180 / Math.PI;
  if      (a >= -135 && a <= -45) onMenu();
  else if (a >  -45  && a <   45) onNext();
  else if (a >=  45  && a <= 135) onPlayPauseBtn();
  else                             onPrev();
}

document.getElementById('centerBtn').addEventListener('click', () => setTimeout(onCenter, 50));

// ══════════════════════════════════════════════
// YOUTUBE
// ══════════════════════════════════════════════
let ytPlayer = null, ytReady = false;
let infoTimer = null, progTimer = null, shuffled = false;

window.onYouTubeIframeAPIReady = () => {
  ytPlayer = new YT.Player('yt-player', {
    playerVars: { autoplay:1, controls:0, rel:0, modestbranding:1, iv_load_policy:3, playsinline:1 },
    events: {
      onReady: () => {
        ytReady = true;
        try { ytPlayer.setVolume(volume); ytPlayer.unMute(); } catch(_){}
        // NFC 태그 → 즉시 재생
        const go = () => {
          try { ytPlayer.loadPlaylist({ listType:'playlist', list:PLAYLIST_ID, index:0 }); } catch(_){}
        };
        go();
      },
      onStateChange: onYTState
    }
  });
};

function onYTState(e) {
  const S = YT.PlayerState;
  if (e.data === S.PLAYING && !shuffled) {
    shuffled = true;
    ensureTrackSlots();
    trackCount = tracks.length || 20;
    try { ytPlayer.setShuffle(false); } catch(_){}
    // load all card thumbnails now that we have playlist IDs
    setTimeout(loadAllCardThumbs, 400);
  }
  if (e.data === S.PLAYING)   { setPlay(true);  startTimers(); updateCurrentIdx(); applyVolume(); }
  if (e.data === S.PAUSED)    { setPlay(false); stopTimers(); }
  if (e.data === S.ENDED)     { nextTrack(); }
  if (e.data === S.BUFFERING) { document.getElementById('npTitle').textContent = 'Loading...'; }
}

// Volume — setVolume works on Android/desktop; iOS ignores it (system-only)
// We apply it on every state change to maximise compatibility
function applyVolume() {
  if (!ytReady) return;
  try { ytPlayer.setVolume(volume); } catch(_){}
  try { ytPlayer.unMute(); } catch(_){}
}

function updateCurrentIdx() {
  if (!ytReady) return;
  try {
    const idx = ytPlayer.getPlaylistIndex();
    if (idx >= 0) {
      currentIdx = idx;
      updateNPArt(currentIdx);
      // tracklist 열려있으면 현재 트랙 위치도 업데이트
      if (appState === 'tracklist') positionCards(carouselAngle);
    }
  } catch(_){}
}

function setPlay(p) {
  isPlaying = p;
  document.querySelectorAll('.np-bar').forEach(b => b.classList.toggle('paused', !p));
  if (appState === 'nowplaying')
    document.getElementById('hRight').textContent = p ? '‖' : '▶';
}

function startTimers() {
  stopTimers();
  updateInfo();
  infoTimer = setInterval(updateInfo, 1800);
  progTimer = setInterval(updateProg, 800);
}
function stopTimers() { clearInterval(infoTimer); clearInterval(progTimer); }

function updateInfo() {
  if (!ytReady || !ytPlayer.getVideoData) return;
  try {
    const d = ytPlayer.getVideoData();
    if (!d || !d.title) return;
    document.getElementById('npTitle').textContent  = d.title  || '—';
    document.getElementById('npArtist').textContent = d.author || '—';
    // show thumbnail in Now Playing
    if (d.video_id) setNPThumb(d.video_id);
    // cache title + set card thumb
    const idx = ytPlayer.getPlaylistIndex();
    if (idx >= 0) {
      updateTrackCardTitle(idx, d.title);
      if (d.video_id) setCardThumb(idx, d.video_id);
    }
  } catch(_) {}
}

function updateProg() {
  if (!ytReady) return;
  try {
    const cur = ytPlayer.getCurrentTime() || 0;
    const dur = ytPlayer.getDuration()    || 0;
    document.getElementById('npCur').textContent  = fmt(cur);
    document.getElementById('npRem').textContent  = dur > 0 ? '-' + fmt(dur-cur) : '-0:00';
    document.getElementById('progFill').style.width = dur > 0 ? (cur/dur*100)+'%' : '0%';
  } catch(_) {}
}

function fmt(s) {
  s = Math.floor(s||0);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function togglePlay() {
  if (!ytReady) return;
  try { isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); } catch(_) {}
}
function nextTrack() { if (ytReady) try { ytPlayer.nextVideo(); } catch(_){} }
function prevTrack() { if (ytReady) try { ytPlayer.previousVideo(); } catch(_){} }

// ── Load YouTube API ──
const _s = document.createElement('script');
_s.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(_s);

// ── Init ──
updateNPArt(0);
</script>
